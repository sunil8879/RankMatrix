name: Deploy RankMatrix to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Create config.js from GitHub Secrets
        run: |
          echo "const API_KEYS = { unihunt: '${{ secrets.UNIHUNT_KEY }}', adzuna_id: '${{ secrets.ADZUNA_ID }}', adzuna_key: '${{ secrets.ADZUNA_KEY }}' };" > config.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages